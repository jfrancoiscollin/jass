# SPDX-License-Identifier: AGPL-3.0-or-later
# Trigger-on-demand workflow that pits a trained NNUE network against
# either the handcrafted evaluation (single-weights mode) or another
# NNUE network (dual-weights mode), on a hosted runner. Reports WLD and
# a score rate.
#
# Single-weights mode (default):
#   weights_path  = path to the network we want to evaluate.
#   weights_b_path is left empty.
#   The chosen network plays as A (white in odd games, black in even
#   games), the handcrafted eval plays as B.
#
# Dual-weights mode:
#   weights_path   = network A.
#   weights_b_path = network B (any combination of Linear / MLP works,
#                    the engine sniffs the magic at load time).
#   Used to measure a candidate model against the current shipped
#   default (`nnue.bin` at the repo root).
#
# How to use it from the GitHub mobile app:
#   1. Repo → Actions → "Benchmark NNUE".
#   2. Tap "Run workflow", pick the depth and the number of pairs.
#      Leave `weights_b_path` empty for the legacy "vs handcrafted"
#      run, or set it to a second weights file (e.g. `nnue.bin`) to
#      compare two networks head-to-head.
#   3. Wait — runtime is dominated by depth × pairs.
#   4. When the run finishes, scroll to the Summary; the WLD verdict
#      is in the log and uploaded as the `benchmark-result` artefact.

name: benchmark-nnue

on:
  workflow_dispatch:
    inputs:
      weights_path:
        description: "Path inside the repo to the A-side weights — either a raw .bin or the .zip artefact downloaded from the train-nnue workflow"
        required: true
        default: "nnue-weights 2.zip"
        type: string
      weights_b_path:
        description: "Optional B-side weights — leave empty to benchmark against the handcrafted eval; set it to compare two NNUE networks (e.g. 'nnue.bin' for the shipped default)"
        required: false
        default: ""
        type: string
      depth:
        description: "Search depth for both engines"
        required: true
        default: "4"
        type: choice
        options:
          - "3"
          - "4"
          - "5"
          - "6"
      pairs:
        description: "Colour-swap pairs per opening (total games = 18 × pairs)"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "5"

concurrency:
  group: benchmark-nnue-${{ github.ref }}
  cancel-in-progress: true

# Opt every JavaScript-based action into the Node.js 24 runtime ahead of
# the June 2026 forced default, silencing the deprecation warning the
# runner emits otherwise.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bench:
    name: NNUE tournament
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Build the native engine (Release)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Resolve weights files (extract zips)
        id: resolve
        run: |
          # Generic resolver: takes a repo path, validates it, extracts
          # any inner *.bin if the path ends in .zip, prints the final
          # absolute path of the .bin to be passed to the engine.
          resolve() {
              local label="$1" src="$2" outdir="$3"
              if [ -z "$src" ]; then echo ""; return 0; fi
              if [ ! -f "$src" ]; then
                  echo "::error::weights file '$src' (input: $label) not found"
                  return 1
              fi
              ls -la "$src" >&2
              case "$src" in
                  *.zip)
                      mkdir -p "$outdir"
                      unzip -o "$src" -d "$outdir" >&2
                      local bin
                      bin=$(find "$outdir" -type f -name '*.bin' | head -1)
                      if [ -z "$bin" ]; then
                          echo "::error::no .bin file found inside '$src'"
                          return 1
                      fi
                      echo "$bin"
                      ;;
                  *)
                      echo "$src"
                      ;;
              esac
          }

          A=$(resolve "weights_path"   "${{ inputs.weights_path }}"   "_a")
          B=$(resolve "weights_b_path" "${{ inputs.weights_b_path }}" "_b")
          echo "Resolved A: $A"
          echo "Resolved B: ${B:-<handcrafted>}"
          echo "a=$A" >> "$GITHUB_OUTPUT"
          echo "b=$B" >> "$GITHUB_OUTPUT"

      - name: Run benchmark
        run: |
          A="${{ steps.resolve.outputs.a }}"
          B="${{ steps.resolve.outputs.b }}"
          if [ -n "$B" ]; then
              ./build/jass --benchmark-nnue-vs-nnue \
                  "$A" "$B" \
                  "${{ inputs.depth }}" \
                  "${{ inputs.pairs }}" | tee benchmark-result.txt
          else
              ./build/jass --benchmark-nnue \
                  "$A" \
                  "${{ inputs.depth }}" \
                  "${{ inputs.pairs }}" | tee benchmark-result.txt
          fi
          echo
          echo "=== Summary ==="
          tail -3 benchmark-result.txt

      - name: Upload result artefact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: benchmark-result.txt
          if-no-files-found: error

      - name: Add summary to job page
        run: |
          {
            echo "## Benchmark result"
            echo
            echo '```'
            cat benchmark-result.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
